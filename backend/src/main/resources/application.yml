spring:
  application:
    name: starter-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/starter}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    io.github.rakheendama.starter: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
