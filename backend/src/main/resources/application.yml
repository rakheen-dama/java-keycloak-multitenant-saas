spring:
  application:
    name: starter-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/starter}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/starter}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/starter/protocol/openid-connect/certs}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

  threads:
    virtual:
      enabled: true

starter:
  otp:
    expiry-minutes: 10
    max-attempts: 5
  email:
    sender-address: noreply@starter.example.com

portal:
  jwt:
    secret: ${PORTAL_JWT_SECRET:change-me-in-production-secret-key-32chars}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

keycloak:
  admin:
    auth-server-url: ${KEYCLOAK_ADMIN_URL:}
    realm: ${KEYCLOAK_REALM:starter}
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

logging:
  level:
    io.github.rakheendama.starter: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
