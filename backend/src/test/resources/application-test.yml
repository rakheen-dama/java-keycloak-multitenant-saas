spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://unused.test/realms/test
          jwk-set-uri: https://unused.test/realms/test/protocol/openid-connect/certs

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  autoconfigure:
    exclude:
      - org.springframework.boot.mail.autoconfigure.MailHealthContributorAutoConfiguration

logging:
  level:
    io.github.rakheendama.starter: DEBUG
    org.flywaydb: DEBUG
